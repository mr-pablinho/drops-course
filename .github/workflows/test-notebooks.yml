name: Test Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow this workflow to be called as a reusable job by build-deploy.yml
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notebook tests
        env:
          HYDRO_ML_CI: "1"
          HYDRO_ML_EPOCHS: "1"
        run: |
          pytest --nbmake --nbmake-timeout=600 book/**/*.ipynb -v
